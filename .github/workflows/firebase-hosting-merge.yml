name: Deploy to Firebase Hosting (live)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # npm install (not npm ci) due to npm bug #4828 — the lockfile is generated
      # on Alpine/musl in our dev container but CI runs Ubuntu/glibc, and npm ci
      # won't install platform-specific binaries (rollup native) not in the lockfile.
      - run: npm install

      - run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          projectId: alexr-co
          channelId: live
