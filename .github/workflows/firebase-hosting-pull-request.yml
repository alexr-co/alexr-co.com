name: Deploy preview channel on PR

on: pull_request

permissions:
  contents: read
  id-token: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Delete the lockfile + fresh npm install — workaround for npm bug #4828.
      # Lockfile is generated on Alpine/musl in our dev container; CI runs Ubuntu/glibc.
      # npm honors the lockfile's recorded optional deps and won't add missing
      # platform-specific binaries (rollup native, etc). Nuking the lockfile forces
      # a fresh resolution that picks the right binaries for the runner.
      - run: rm -f package-lock.json
      - run: npm install

      - run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # Call Firebase CLI directly instead of FirebaseExtended/action-hosting-deploy@v0
      # because that action hardcodes a JSON key requirement and ignores
      # GOOGLE_APPLICATION_CREDENTIALS set by google-github-actions/auth@v2.
      - run: npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} --project alexr-co --expires 7d --non-interactive
