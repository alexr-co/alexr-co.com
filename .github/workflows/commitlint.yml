name: Lint commit messages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 grabs the full history so commitlint can lint the
          # full range of commits in a push or PR (not just the latest).
          fetch-depth: 0

      # Uses commitlint.config.cjs at the repo root. The action installs
      # commitlint + config-conventional internally; no need to maintain
      # those as repo devDependencies.
      - uses: wagoid/commitlint-github-action@v6
