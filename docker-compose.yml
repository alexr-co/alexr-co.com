services:
  web:
    build: .
    container_name: personal-website-dev
    ports:
      - "4321:4321"
    volumes:
      # Bind-mount the source so edits on the host are reflected in the
      # container instantly. node_modules is a named volume so the host
      # never sees the install — keeping the dev env truly isolated.
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true

volumes:
  node_modules:
